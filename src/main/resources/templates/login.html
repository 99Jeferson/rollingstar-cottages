<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rolling Star Cottages | System Authentication</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .brand-header { text-align: center; margin-bottom: 30px; }
        .brand-header h2 { color: #38bdf8; font-size: 28px; font-weight: 600; letter-spacing: 0.5px; }
        .brand-header p { color: #94a3b8; font-size: 14px; margin-top: 5px; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; color: #cbd5e1; font-size: 14px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .form-group input:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); }
        .error-banner {
            background: rgba(239, 68, 68, 0.15);
            border-left: 4px solid #ef4444;
            color: #fca5a5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #0284c7;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
        }
        .submit-btn:hover { background: #0369a1; }
        .submit-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-header">
        <h2>Rolling Star</h2>
        <p>Cottages Management System</p>
    </div>

    <div class="error-banner" th:if="${param.error}">
        Invalid username or password. Please try again.
    </div>
    
    <div class="error-banner" style="border-color: #22c55e; background: rgba(34, 197, 94, 0.15); color: #86efac;" th:if="${param.logout}">
        You have been logged out.
    </div>

    <form th:action="@{/login}" method="POST">
        <div class="form-group">
            <label for="username">Staff Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="off">
        </div>
        
        <div class="form-group">
            <label for="password">Security Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>
        
        <button type="submit" class="submit-btn">Verify Credentials</button>
    </form>
</div>

</body>
</html>
